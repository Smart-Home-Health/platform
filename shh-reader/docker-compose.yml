services:
  shh-reader:
    build: .
    container_name: shh-reader
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      # Mount serial device (adjust as needed for your setup)
      # - /dev/ttyUSB0:/dev/ttyUSB0
    devices:
      # Uncomment and adjust for your serial device
      # - /dev/ttyUSB0:/dev/ttyUSB0
      # For GPIO access on Raspberry Pi
      # - /dev/gpiochip0:/dev/gpiochip0
    privileged: false  # Set to true if GPIO access issues
    environment:
      - SHH_READER_DATA_DIR=/data
      - TZ=America/Chicago
    # For GPIO access, may need:
    # group_add:
    #   - dialout  # For serial
    #   - gpio     # For GPIO
