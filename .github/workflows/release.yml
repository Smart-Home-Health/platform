name: Release image

# Builds and pushes the unified multi-arch image to Docker Hub when a version
# tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
#
# Pushes to the `smarthomehealth` Docker Hub org. Requires two repo secrets:
#   DOCKERHUB_USERNAME  a Docker Hub user with push access to that org
#   DOCKERHUB_TOKEN     that user's access token (Account Settings -> Security)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3        # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: smarthomehealth/platform
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
