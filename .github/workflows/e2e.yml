name: E2E (Playwright)

# Browser smoke against the real docker-compose stack. Heavier and slower than
# the unit suites, so it is opt-in (manual dispatch) rather than blocking every
# PR. The credential-free smoke runs unconditionally; the full login -> /care
# test is skipped unless E2E_USER + E2E_PASSWORD/E2E_PIN repo secrets are set.
on:
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start the stack
        run: docker compose up -d --build

      - name: Wait for the frontend to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5173 >/dev/null; then
              echo "frontend up"; exit 0
            fi
            sleep 2
          done
          echo "frontend did not come up in time"; docker compose logs; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps + browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        env:
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_PIN: ${{ secrets.E2E_PIN }}
        run: npm run e2e

      - name: Tear down
        if: always()
        run: docker compose down -v
