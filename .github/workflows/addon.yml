name: Add-on image

# Builds and pushes the Home Assistant add-on image (bundled Postgres/TimescaleDB
# + the unified app) to GHCR on a version tag. Per HA add-on convention each arch
# gets its own image tag (amd64-addon / aarch64-addon) that addon/config.yaml
# references. Built from the repo root so the Dockerfile can reach backend/ +
# frontend/. Uses the built-in GITHUB_TOKEN (no extra secrets).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3        # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: addon/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: BUILD_FROM=${{ matrix.base }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
