name: CI

# Runs the automated test suites on every push to a long-lived branch and on
# every PR. Backend uses the same ephemeral-Timescale gate as scripts/run_tests.sh;
# frontend runs lint + Vitest + a production build.
on:
  push:
    branches: [main, "dev/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + Timescale)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backend test gate
        # Builds the backend image, spins up an ephemeral TimescaleDB, runs the
        # full pytest suite in a one-shot container, exits non-zero on failure.
        run: bash scripts/run_tests.sh

  frontend:
    name: Frontend (lint + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (report-only)
        # The repo carries a large pre-existing ESLint backlog, so lint is
        # surfaced but does not fail the build. Flip continue-on-error to false
        # once the backlog is cleared to make it a hard gate.
        run: npm run lint
        continue-on-error: true
      - name: Unit tests (Vitest)
        # TZ is pinned in the npm script; keep it deterministic here too.
        run: npm test
      - run: npm run build
